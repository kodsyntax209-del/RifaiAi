<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaman AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --card: #111620;
    --border: #1e2a3a;
    --accent: #00f0ff;
    --accent2: #7c3aed;
    --text: #e2e8f0;
    --muted: #64748b;
    --user-bubble: #1a2540;
    --ai-bubble: #111620;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 2rem;
    background: rgba(8,11,16,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .bot-avatar {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    box-shadow: 0 0 20px rgba(0,240,255,0.3);
    flex-shrink: 0;
  }

  .bot-info h1 { font-size: 1rem; font-weight: 700; }

  .bot-status {
    font-size: 0.75rem;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .api-key-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    width: 280px;
    outline: none;
    transition: border-color 0.3s;
  }

  .api-key-input:focus { border-color: var(--accent); }
  .api-key-input::placeholder { color: var(--muted); }

  .save-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .save-btn:hover { box-shadow: 0 0 20px rgba(0,240,255,0.4); }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .welcome {
    text-align: center;
    margin: auto;
    padding: 2rem;
  }

  .welcome-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    display: block;
    filter: drop-shadow(0 0 20px rgba(0,240,255,0.5));
  }

  .welcome h2 {
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome p { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
    justify-content: center;
  }

  .suggestion {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.5rem 1.2rem;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s;
  }

  .suggestion:hover { border-color: var(--accent); color: var(--accent); }

  .message {
    display: flex;
    gap: 0.8rem;
    max-width: 800px;
    animation: fadeInUp 0.3s ease;
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.ai { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message.user .msg-avatar { background: linear-gradient(135deg, var(--accent2), #a855f7); }
  .message.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 15px rgba(0,240,255,0.2);
  }

  .msg-bubble {
    padding: 0.9rem 1.2rem;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: calc(100% - 50px);
    word-break: break-word;
  }

  .message.user .msg-bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(0,240,255,0.15);
    border-top-right-radius: 4px;
  }

  .message.ai .msg-bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .typing-indicator { display: flex; gap: 4px; padding: 0.5rem 0; }

  .typing-indicator span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  .input-area {
    padding: 1.2rem 2rem;
    background: rgba(8,11,16,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-box {
    display: flex;
    gap: 0.8rem;
    align-items: flex-end;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0.8rem 1rem;
    transition: border-color 0.3s;
  }

  .input-box:focus-within {
    border-color: rgba(0,240,255,0.4);
    box-shadow: 0 0 20px rgba(0,240,255,0.05);
  }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--muted); }

  .send-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    width: 38px; height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
    font-size: 1rem;
  }

  .send-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(0,240,255,0.4); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .input-hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.6rem;
  }

  .toast {
    position: fixed;
    top: 80px; right: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.2rem;
    font-size: 0.85rem;
    z-index: 999;
    animation: slideIn 0.3s ease;
    display: none;
  }

  .toast.success { border-color: #10b981; color: #10b981; }
  .toast.error { border-color: #ef4444; color: #ef4444; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes typing {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 600px) {
    .api-key-input { width: 160px; }
    .chat-area { padding: 1rem; }
    .input-area { padding: 1rem; }
    header { padding: 0.8rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="bot-avatar">🤖</div>
  <div class="bot-info">
    <h1>Yaman AI</h1>
    <div class="bot-status">
      <div class="status-dot"></div>
      Çevrimiçi
    </div>
  </div>
  <div class="header-right">
    <input class="api-key-input" id="api-key" type="password" placeholder="Groq API Key gir (gsk_...)">
    <button class="save-btn" onclick="saveKey()">Kaydet</button>
  </div>
</header>

<div class="toast" id="toast"></div>

<div class="chat-area" id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">🤖</span>
    <h2>Merhaba! Ben Yaman AI</h2>
    <p>Sana her konuda yardımcı olabilirim. Ne sormak istersin?</p>
    <div class="suggestions">
      <div class="suggestion" onclick="sendSuggestion('Merhaba! Kendini tanıt.')">👋 Kendini tanıt</div>
      <div class="suggestion" onclick="sendSuggestion('Python öğrenmek istiyorum, nereden başlamalıyım?')">🐍 Python öğren</div>
      <div class="suggestion" onclick="sendSuggestion('Web sitesi yapmak için ne öğrenmeliyim?')">🌐 Web geliştirme</div>
      <div class="suggestion" onclick="sendSuggestion('Bana kısa bir hikaye yaz.')">📖 Hikaye yaz</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="user-input" placeholder="Bir şey sor..." rows="1"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <div class="input-hint">Enter ile gönder • Shift+Enter ile yeni satır</div>
</div>

<script>
  let apiKey = localStorage.getItem('groq_api_key') || '';
  let messages = [];
  let isLoading = false;

  if (apiKey) document.getElementById('api-key').value = apiKey;

  function saveKey() {
    const key = document.getElementById('api-key').value.trim();
    if (!key.startsWith('gsk_')) {
      showToast('❌ Geçersiz key! "gsk_" ile başlamalı', 'error');
      return;
    }
    apiKey = key;
    localStorage.setItem('groq_api_key', key);
    showToast('✅ API Key kaydedildi!', 'success');
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  function addMessage(role, content) {
    const chat = document.getElementById('chat');
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message ai';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;

    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    if (!apiKey) {
      showToast('❌ Önce API Key gir ve kaydet!', 'error');
      return;
    }

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    addMessage('user', text);
    messages.push({ role: 'user', content: text });
    addTyping();

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama3-70b-8192',
          messages: [
            {
              role: 'system',
              content: "Sen Yaman AI'sın. Yaman tarafından geliştirilmiş bir yapay zeka asistanısın. Türkçe konuşuyorsun. Kısa, net ve samimi cevaplar veriyorsun."
            },
            ...messages
          ],
          max_tokens: 1024,
          temperature: 0.7
        })
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });

      removeTyping();
      addMessage('ai', reply);

    } catch (err) {
      removeTyping();
      addMessage('ai', '❌ Hata: ' + (err.message || 'Bir şeyler ters gitti. API key\'ini kontrol et.'));
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function sendSuggestion(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
